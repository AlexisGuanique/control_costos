version: "3.9"

services:
  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/database.db
    volumes:
      - db_data:/app/data
      - ./backend:/app          # hot-reload en desarrollo
    ports:
      - "8000:8000"
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: fintrack-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - fintrack-net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
    name: fintrack-db-data

networks:
  fintrack-net:
    name: fintrack-network
    driver: bridge
